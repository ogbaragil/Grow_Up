<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f6f8" />
  <meta name="description" content="Track your net worth, set wealth goals, and reach financial independence." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Grow UP" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/growup-logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://growupapp.app/" />
  <meta property="og:title" content="Grow UP — See your complete financial picture" />
  <meta property="og:description" content="Track net worth, forecast goals, and watch your progress become a timeline. No spreadsheets, no bank logins, no stress." />
  <meta property="og:image" content="https://growupapp.app/screenshots/overview.jpeg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Grow UP — See your complete financial picture" />
  <meta name="twitter:description" content="Track net worth, forecast goals, and watch your progress become a timeline. No spreadsheets, no bank logins, no stress." />
  <meta name="twitter:image" content="https://growupapp.app/screenshots/overview.jpeg" />
  <title>Grow UP — Personal Finance</title>
  <script>
    // Apply saved theme before first paint to avoid white flash and
    // make the current mode unambiguous from the moment the app loads.
    try {
      var growupState = JSON.parse(localStorage.getItem("growup_history_monthbar_v1"));
      if (growupState && growupState.theme === "dark") {
        document.documentElement.dataset.theme = "dark";
      }
    } catch (e) {}
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
  <script>
    // Capture the PWA install event as early as possible (it can fire before
    // React mounts). Stash it globally and notify the app so the install
    // prompt can offer one-tap install on Android/Chromium.
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__deferredInstallPrompt = e;
      window.dispatchEvent(new Event('growup:installavailable'));
    });
    window.addEventListener('appinstalled', function () {
      window.__deferredInstallPrompt = null;
      try { localStorage.setItem('growup_pwa_installed', '1'); } catch (e) {}
      window.dispatchEvent(new Event('growup:installed'));
    });
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
